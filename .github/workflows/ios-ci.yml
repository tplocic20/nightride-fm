# Fast PR check: make sure the iOS app still compiles. No signing, no secrets.
# Keeps the release workflow (ios-appstore.yml) from being the first place a
# build break is noticed. Builds for the Simulator, so no provisioning is needed.

name: iOS CI

on:
  pull_request:
    paths:
      - "ios/**"
      - "assets/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15   # Apple silicon; match the release toolchain (Xcode 26.x)
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode (match release; open xcodegen project)
        run: |
          # Pick the newest installed Xcode so CI compiles against the same SDK
          # the release uses (macos-15 ships Xcode 26.x), and so the xcodegen
          # project format (object version 77) always opens. See ios-appstore.yml.
          newest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$newest" ]; then echo "::error::no Xcode found on runner"; exit 1; fi
          echo "→ selecting $newest"
          sudo xcode-select -s "$newest/Contents/Developer"
          xcodebuild -version
          major="$(xcodebuild -version | sed -nE 's/^Xcode ([0-9]+).*/\1/p')"
          if [ "${major:-0}" -lt 16 ]; then
            echo "::error::need Xcode 16+ to open the generated project; got Xcode ${major:-?}"
            exit 1
          fi

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: |
          cd ios
          bash build.sh

      - name: xcodebuild (Simulator, no signing)
        run: |
          cd ios
          xcodebuild \
            -project Nightride.xcodeproj \
            -scheme Nightride \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGNING_ALLOWED=NO
