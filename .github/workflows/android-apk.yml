# Build a signed Android APK and publish it on the GitHub Release — the
# DIRECT-DOWNLOAD / sideload channel (link it from plocic.dev, share in Discord).
# Mirrors macos-dmg.yml and lands on the SAME v* release as the macOS .dmg
# (softprops/action-gh-release upserts the release for the tag).
#
# Independent of Google Play: this APK is signed with your UPLOAD key, whereas
# Play re-signs with Google's app key (Play App Signing). So GitHub and Play are
# PARALLEL channels — an install from one can't update from the other (different
# signatures). For a community / sideload app that's expected.
#
# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — repository secrets (shared with android-playstore.yml):
#   ANDROID_KEYSTORE_BASE64    Upload keystore (.jks), base64.
#   ANDROID_KEYSTORE_PASSWORD  Keystore (store) password.
#   ANDROID_KEY_ALIAS          Key alias.
#   ANDROID_KEY_PASSWORD       Key password.
# No Play service account needed — this channel never touches Google Play, so it
# ships even if Play isn't configured. Fails fast at preflight until the keystore
# secrets exist; it never publishes an unsigned APK.
# ──────────────────────────────────────────────────────────────────────────

name: Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write       # needed to attach to the GitHub Release

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets present?
        env:
          KS:     ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PW:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ALIAS:  ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for v in KS KS_PW ALIAS KEY_PW; do
            if [ -z "${!v}" ]; then echo "✗ missing secret: $v"; missing=1; fi
          done
          if [ "$missing" = 1 ]; then
            echo "::error::Android signing secrets are not configured. See the header of .github/workflows/android-apk.yml and android/DEPLOYMENT.md."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"

      - name: Build signed APK
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_storeFile:     ${{ runner.temp }}/upload.jks
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk Nightride.apk

      - name: Release notes from CHANGELOG.md
        run: |
          NOTES="$(bash scripts/changelog.sh "${GITHUB_REF_NAME#v}" 2>/dev/null || true)"
          [ -n "$NOTES" ] && printf '%s\n' "$NOTES" > RELEASE_NOTES.md \
            || echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md

      - name: Attach APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/Nightride.apk
          body_path: RELEASE_NOTES.md   # from CHANGELOG.md; macos-dmg writes the same → no dupes
          fail_on_unmatched_files: true
