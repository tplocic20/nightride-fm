# Build a signed Android App Bundle (.aab) and upload it to Google Play.
#
# Mirrors the Apple store workflows: triggered by the same vX.Y.Z tag that
# scripts/release.sh pushes (release.sh already bumps the Android versionName +
# versionCode), so ONE tag fans out to macOS, iOS AND Android. Publishes to the
# INTERNAL testing track — promote to production from the Play Console.
#
# Like the Apple ones, this fails fast at "preflight" until the secrets exist,
# so it's an inert no-op until Android is configured.
#
# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — repository secrets (Settings ▸ Secrets and variables ▸ Actions):
#   ANDROID_KEYSTORE_BASE64    Upload keystore (.jks), base64:  base64 -i upload.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD  Keystore (store) password.
#   ANDROID_KEY_ALIAS          Key alias inside the keystore.
#   ANDROID_KEY_PASSWORD       Key password.
#   PLAY_SERVICE_ACCOUNT_JSON  Play Console service account JSON (Release perms), pasted whole.
#
# Plus, ONCE and by hand (the Play API cannot do the first release):
#   1. Create the app in Play Console with package dev.plocic.nightride.
#   2. Complete the listing gates (privacy policy, content rating, data safety,
#      target audience) and enrol in Play App Signing.
#   3. Upload one signed .aab to Internal testing manually. After that, CI publishes.
# Full walkthrough: android/DEPLOYMENT.md.
# ──────────────────────────────────────────────────────────────────────────

name: Android Play Store

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: android-playstore-${{ github.ref }}
  cancel-in-progress: false   # never abort an in-flight upload

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets present?
        env:
          KS:     ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PW:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ALIAS:  ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SA:     ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          missing=0
          for v in KS KS_PW ALIAS KEY_PW SA; do
            if [ -z "${!v}" ]; then echo "✗ missing secret: $v"; missing=1; fi
          done
          if [ "$missing" = 1 ]; then
            echo "::error::Android signing / Play secrets are not configured. See the header of .github/workflows/android-playstore.yml and android/DEPLOYMENT.md."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"

      - name: Build signed release bundle (.aab)
        working-directory: android
        # app/build.gradle.kts reads these ORG_GRADLE_PROJECT_* values as the
        # release signingConfig when keystore.properties is absent (i.e. on CI).
        env:
          ORG_GRADLE_PROJECT_storeFile:     ${{ runner.temp }}/upload.jks
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon

      - name: Play "What's new" from CHANGELOG.md
        run: |
          mkdir -p distribution/whatsnew
          NOTES="$(bash scripts/changelog.sh "${GITHUB_REF_NAME#v}" 2>/dev/null || true)"
          [ -z "$NOTES" ] && NOTES="Bug fixes and improvements."
          # Play caps release notes at 500 chars per locale.
          printf '%s' "$NOTES" | head -c 500 > distribution/whatsnew/whatsnew-en-US

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.plocic.nightride
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          whatsNewDirectory: distribution/whatsnew   # release notes from CHANGELOG.md
          track: internal     # promote to production from the Play Console
          status: completed
