# Build a signed Android App Bundle (.aab) and upload it to Google Play.
#
# ⚠️ STATUS: SCAFFOLD — needs a Google Play Console account ($25 one-time), a
# created app listing, an upload keystore, and a service-account JSON. Fails at
# preflight until the secrets below exist. Lives on its own branch until ready.
#
# Unlike the Apple stores there's no human trademark gate at submit time, but you
# still must not impersonate the official app (see TRADEMARK.md).
#
# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — repository secrets:
#   ANDROID_KEYSTORE_BASE64    Your upload keystore (.jks/.keystore), base64:
#                                base64 -i upload.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD  Keystore password.
#   ANDROID_KEY_ALIAS          Key alias inside the keystore.
#   ANDROID_KEY_PASSWORD       Key password.
#   PLAY_SERVICE_ACCOUNT_JSON  Play Console ▸ a service account with "Release"
#                                permission; its JSON key, pasted whole.
# Plus: create the app in Play Console with package dev.plocic.nightride and do
# the very first upload MANUALLY (Play requires a human first release before the
# API can publish).
# ──────────────────────────────────────────────────────────────────────────

name: Android Play Store

on:
  workflow_dispatch:
  push:
    tags: ["android-v*"]   # e.g. android-v0.2.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets present?
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          missing=0
          for v in KS SA; do
            if [ -z "${!v}" ]; then echo "✗ missing secret: $v"; missing=1; fi
          done
          if [ "$missing" = 1 ]; then
            echo "::error::Android signing / Play secrets not configured. See the header of .github/workflows/android-playstore.yml."
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"

      - name: Build signed AAB
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_storeFile: ${{ runner.temp }}/upload.jks
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # NOTE: app/build.gradle.kts needs a release signingConfig that reads
          # the ORG_GRADLE_PROJECT_* properties above. That block is not added
          # yet (no keystore exists) — see TODO in the build file. Until then
          # this step builds an unsigned bundle and the upload will be rejected.
          chmod +x gradlew
          ./gradlew :app:bundleRelease --no-daemon

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dev.plocic.nightride
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal     # promote to production from the Play Console
          status: completed
