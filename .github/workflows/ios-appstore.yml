# Build, sign, package, and upload the iOS app to the iOS APP STORE / TestFlight.
# The iOS sibling of macos-appstore.yml.
#
# ──────────────────────────────────────────────────────────────────────────
# ONE TAG FANS OUT TO EVERYTHING
#   Push a version tag like `v0.2.0` and every store workflow runs off it:
#     • macos-dmg.yml      → notarized .dmg on a GitHub Release (download link)
#     • macos-appstore.yml → signed .pkg uploaded to App Store Connect (macOS)
#     • ios-appstore.yml   → signed .ipa uploaded to App Store Connect (this file)
#   Only the DMG job touches the GitHub Release, so they never collide.
#
# This mirrors ios/release-appstore.sh, importing the signing material from repo
# secrets into a throwaway keychain instead of a local login keychain.
# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — iOS reuses the ACCOUNT-WIDE secrets the macOS App Store
# channel already set, and adds exactly ONE new one:
#
#   Reused as-is from macos-appstore.yml (no need to re-add):
#     MAS_CERTS_P12_BASE64     Combined .p12 — its "Apple Distribution" cert
#                              signs the iOS app too (account-wide identity).
#     MAS_CERTS_P12_PASSWORD   Password for that .p12.
#     MAS_APP_IDENTITY         "Apple Distribution: Your Name (TEAMID)".
#     ASC_KEY_ID               App Store Connect API key id (10 chars).
#     ASC_ISSUER_ID            App Store Connect API issuer id (uuid).
#     ASC_API_KEY_P8_BASE64    base64 of the AuthKey_<ASC_KEY_ID>.p8 file.
#
#   NEW — add this one (see ios/DEPLOYMENT.md):
#     IOS_PROVISION_PROFILE_BASE64  base64 of the iOS "App Store" .mobileprovision
#                                   for dev.plocic.nightride (the shared bundle id).
#
# Plus the App Store Connect steps in ios/DEPLOYMENT.md (register the bundle id,
# create the app record + an "App Store" provisioning profile).
# Until the secrets exist the job fails fast at "preflight".
# ──────────────────────────────────────────────────────────────────────────

name: iOS App Store

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.2.0). Defaults to the project.yml value."
        required: false

permissions:
  contents: read

concurrency:
  group: ios-appstore-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: macos-14   # Apple silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16+ (open xcodegen's format-77 project)
        run: |
          # Homebrew's xcodegen writes an Xcode-16 project format (objectVersion
          # 77) that the macos-14 runner's DEFAULT Xcode 15.4 refuses to open
          # ("future Xcode project file format (77)"). Switch to the newest Xcode
          # the runner ships (macos-14 carries 16.x). Apple also requires the
          # iOS 18 / Xcode 16 SDK for App Store uploads now, so this is needed
          # regardless. The macOS jobs build via SwiftPM and are unaffected.
          newest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$newest" ]; then echo "::error::no Xcode found on runner"; exit 1; fi
          echo "→ selecting $newest"
          sudo xcode-select -s "$newest/Contents/Developer"
          xcodebuild -version
          major="$(xcodebuild -version | sed -nE 's/^Xcode ([0-9]+).*/\1/p')"
          if [ "${major:-0}" -lt 16 ]; then
            echo "::error::need Xcode 16+ to open the generated project; got Xcode ${major:-?}"
            exit 1
          fi

      - name: Preflight — required secrets present?
        env:
          P12: ${{ secrets.MAS_CERTS_P12_BASE64 }}
          APP_ID: ${{ secrets.MAS_APP_IDENTITY }}
          PROFILE: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_P8: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          missing=0
          for v in P12 APP_ID PROFILE ASC_KEY_ID ASC_ISSUER_ID ASC_P8; do
            if [ -z "${!v}" ]; then echo "✗ missing secret: $v"; missing=1; fi
          done
          if [ "$missing" = 1 ]; then
            echo "::error::iOS App Store signing/upload secrets are not configured. See the header of .github/workflows/ios-appstore.yml and ios/DEPLOYMENT.md."
            exit 1
          fi

      - name: Generate icons + artwork
        run: |
          brew install librsvg
          cd assets
          npm install --no-audit --no-fund
          node icon.mjs
          node generate.mjs

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.MAS_CERTS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAS_CERTS_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certs.p12"
          # The combined .p12 also holds the Mac Installer cert; iOS just ignores it.
          security import "$RUNNER_TEMP/certs.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/certs.p12"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/Nightride.mobileprovision"
          # release-appstore.sh installs it into the standard location by UUID.

      - name: Store App Store Connect API key
        env:
          P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$P8_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"

      - name: Derive version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "marketing=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "marketing=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build → sign → ipa → upload
        env:
          IOS_APP_IDENTITY: ${{ secrets.MAS_APP_IDENTITY }}
          PROVISION_PROFILE: ${{ runner.temp }}/Nightride.mobileprovision
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          MARKETING_VERSION: ${{ steps.ver.outputs.marketing }}
          BUILD_NUMBER: ${{ steps.ver.outputs.build }}
        run: |
          cd ios
          bash release-appstore.sh
