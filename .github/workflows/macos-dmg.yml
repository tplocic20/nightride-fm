# Build, Developer-ID sign, notarize, and publish the macOS app as a .dmg on a
# GitHub Release. This is the DIRECT-DOWNLOAD channel (link it from plocic.dev).
#
# Triggers on a version tag like `v0.2.0`. The job mirrors macos/release.sh, but
# imports the signing identity from repo secrets into a throwaway keychain
# instead of using your local login keychain.
#
# ──────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP — add these as repository secrets
#   (Settings ▸ Secrets and variables ▸ Actions ▸ New repository secret):
#
#   MACOS_CERT_P12_BASE64   Your "Developer ID Application" cert + private key,
#                           exported from Keychain Access as a .p12, then:
#                             base64 -i DeveloperID.p12 | pbcopy
#   MACOS_CERT_PASSWORD     The password you set when exporting that .p12.
#   MACOS_SIGN_IDENTITY     The identity string, e.g.
#                             "Developer ID Application: Your Name (TEAMID)"
#   AC_NOTARY_APPLE_ID      hello@plocic.dev  (your Apple Developer account)
#   AC_NOTARY_PASSWORD      An app-specific password from appleid.apple.com.
#   AC_NOTARY_TEAM_ID       Your 10-char Team ID.
#
# Until those secrets exist the job fails fast at the "preflight" step with a
# clear message — it never produces an unsigned artifact.
# ──────────────────────────────────────────────────────────────────────────

name: macOS DMG

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write       # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-14   # Apple silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — required secrets present?
        env:
          P12: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_ID: ${{ secrets.AC_NOTARY_APPLE_ID }}
        run: |
          missing=0
          for v in P12 IDENTITY AC_ID; do
            if [ -z "${!v}" ]; then echo "✗ missing secret: $v"; missing=1; fi
          done
          if [ "$missing" = 1 ]; then
            echo "::error::Signing/notarization secrets are not configured. See the header of .github/workflows/macos-dmg.yml."
            exit 1
          fi

      - name: Generate icons + artwork
        run: |
          # rsvg-convert (librsvg) renders the SVGs; Node runs the generators.
          brew install librsvg
          cd assets
          npm install --no-audit --no-fund
          node icon.mjs
          node generate.mjs

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign finds the cert.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Store notarization credentials
        env:
          AC_ID: ${{ secrets.AC_NOTARY_APPLE_ID }}
          AC_PW: ${{ secrets.AC_NOTARY_PASSWORD }}
          AC_TEAM: ${{ secrets.AC_NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials nightride-notary \
            --apple-id "$AC_ID" --team-id "$AC_TEAM" --password "$AC_PW"

      - name: Build → sign → notarize → DMG
        env:
          # release.sh auto-detects the identity, but pin it explicitly in CI.
          DEV_ID_APP: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_PROFILE: nightride-notary
        run: |
          cd macos
          bash release.sh

      - name: Upload DMG to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macos/build/Nightride.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
