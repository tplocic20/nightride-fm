# xcodegen project definition for the iOS Nightride app.
# Regenerate the .xcodeproj with `xcodegen generate` (or run ./build.sh).
#
# The CarPlay code is unconditionally compiled in. To actually activate it,
# you need to:
#   1. Replace App/Nightride.entitlements with App/Nightride.carplay.entitlements
#      (which adds `com.apple.developer.carplay-audio`)
#   2. Have a provisioning profile that carries the CarPlay entitlement —
#      Apple grants that on request after Developer Program enrollment.
# Without those, the app still builds & runs fine on iPhone; CarPlay just
# never activates.

name: Nightride

options:
  bundleIdPrefix: fm.nightride
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: bottom
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO

targets:
  Nightride:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      testTargets: []
      gatherCoverageData: false
    sources:
      - path: Sources
      # Shared per-station cover art (generated in /assets) — referenced in
      # place, not copied, so there's a single source of truth in the monorepo.
      - path: ../assets/artwork
        name: Artwork
        buildPhase: resources
      - path: App/Info.plist
        buildPhase: none
      - path: App/Nightride.entitlements
        buildPhase: none
      - path: App/Nightride.carplay.entitlements
        buildPhase: none
    resources:
      - path: App/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Nightride.entitlements
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        # Bundle id must be globally unique to Apple's signing servers.
        # Override by editing this line OR via: BUNDLE_ID=... bash build.sh
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID}
        # Leave team blank → Xcode prompts on first open.
        # Override via: DEVELOPMENT_TEAM=ABCDE12345 bash build.sh
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: NO
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
