# xcodegen project definition for the iOS Nightride app.
# Regenerate the .xcodeproj with `xcodegen generate` (or run ./build.sh).
#
# The CarPlay code is unconditionally compiled in. To actually activate it:
#   1. Build with CARPLAY=1 (e.g. `CARPLAY=1 bash build.sh`), which points
#      CODE_SIGN_ENTITLEMENTS at App/Nightride.carplay.entitlements (the file
#      that adds `com.apple.developer.carplay-audio`).
#   2. Have a provisioning profile that carries the CarPlay entitlement —
#      Apple grants that on request after Developer Program enrollment.
# Without those, the app still builds & runs fine on iPhone; CarPlay just
# never activates. The iOS Simulator does NOT enforce the entitlement, so a
# CARPLAY=1 Simulator build lets you test the CarPlay UI before Apple grants it.

name: Nightride

options:
  bundleIdPrefix: fm.nightride
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: bottom
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO

targets:
  Nightride:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      testTargets: []
      gatherCoverageData: false
    sources:
      - path: Sources
      # Shared per-station cover art (generated in /assets) — referenced in
      # place, not copied, so there's a single source of truth in the monorepo.
      - path: ../assets/artwork
        name: Artwork
        buildPhase: resources
      # App icon + colours. Declared under `sources` (not `resources`) because
      # xcodegen only reliably adds .xcassets to the resources build phase from
      # here — a top-level `resources:` entry was silently dropped, so the asset
      # catalog never compiled and the app shipped the placeholder icon.
      - path: App/Assets.xcassets
        buildPhase: resources
      - path: App/Info.plist
        buildPhase: none
      - path: App/Nightride.entitlements
        buildPhase: none
      - path: App/Nightride.carplay.entitlements
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        # App/Nightride.entitlements by default; App/Nightride.carplay.entitlements
        # when CARPLAY=1. Set by build.sh — see its header.
        CODE_SIGN_ENTITLEMENTS: ${ENTITLEMENTS}
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        # Bundle id must be globally unique to Apple's signing servers.
        # Override by editing this line OR via: BUNDLE_ID=... bash build.sh
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID}
        # Leave team blank → Xcode prompts on first open.
        # Override via: DEVELOPMENT_TEAM=ABCDE12345 bash build.sh
        DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: NO
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        # Launch screen is defined explicitly via the UILaunchScreen dict in
        # App/Info.plist (dark ground + centred logo). Leaving the auto-generation
        # flag on would let Xcode synthesise a plain one and ignore ours.
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
